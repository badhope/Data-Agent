version: '3.8'

services:
  office-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - AGENT_MODEL=gpt-3.5-turbo
    depends_on:
      - redis
    networks:
      - office-agent-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - office-agent-network

volumes:
  redis-data:

networks:
  office-agent-network:
    driver: bridge