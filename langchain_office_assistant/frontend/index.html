<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Agent - 智能办公助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e17;
  --bg-surface: #111827;
  --bg-card: #1a2236;
  --bg-hover: #243049;
  --border: #2a3654;
  --border-active: #4f6ef7;
  --text-primary: #e8ecf4;
  --text-secondary: #8899b8;
  --text-muted: #566a8e;
  --accent: #4f6ef7;
  --accent-glow: rgba(79,110,247,0.25);
  --accent-soft: rgba(79,110,247,0.1);
  --success: #34d399;
  --warning: #fbbf24;
  --error: #f87171;
  --user-bubble: linear-gradient(135deg, #4f6ef7 0%, #7c5cf5 100%);
  --bot-bubble: #1a2236;
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-header h1 .logo {
  width: 32px;
  height: 32px;
  background: var(--user-bubble);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.new-chat-btn {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  background: var(--accent-soft);
  border: 1px dashed var(--border-active);
  border-radius: var(--radius-sm);
  color: var(--accent);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.new-chat-btn:hover { background: var(--accent-glow); }

.nav-section {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  font-size: 13px;
  color: var(--text-secondary);
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--border-active);
}
.nav-item .icon { font-size: 16px; }
.nav-item .badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-item {
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 4px;
  border: 1px solid transparent;
}
.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--bg-card); border-color: var(--border-active); }
.session-item .session-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-item .session-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== MAIN CONTENT ===== */
.main-content {
  display: flex;
  flex-direction: column;
  background: var(--bg-deep);
  position: relative;
  overflow: hidden;
}

/* ===== HEADER ===== */
.chat-header {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(17,24,39,0.8);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
}

.chat-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success);
}

.chat-header h2 { font-size: 15px; font-weight: 500; }

.header-actions {
  display: flex;
  gap: 8px;
}

.header-btn {
  padding: 6px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.header-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ===== PAGE CONTAINER ===== */
.page-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* ===== WELCOME PAGE ===== */
.welcome-page { max-width: 900px; margin: 0 auto; }

.welcome-hero {
  text-align: center;
  padding: 40px 20px;
}

.welcome-icon {
  width: 80px;
  height: 80px;
  background: var(--user-bubble);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 20px;
  box-shadow: 0 0 60px var(--accent-glow);
}

.welcome-hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.welcome-hero p { color: var(--text-secondary); font-size: 15px; max-width: 500px; margin: 0 auto; }

/* ===== CAPABILITIES GRID ===== */
.capabilities-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-top: 32px;
}

.capability-card {
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
}
.capability-card:hover {
  border-color: var(--border-active);
  background: var(--bg-hover);
  transform: translateY(-2px);
}

.capability-icon { font-size: 28px; margin-bottom: 10px; }
.capability-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.capability-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.capability-tools { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.capability-tools span {
  font-size: 10px;
  padding: 2px 6px;
  background: var(--bg-deep);
  border-radius: 4px;
  color: var(--text-secondary);
}

/* ===== SETTINGS PAGE ===== */
.settings-page { max-width: 800px; margin: 0 auto; }

.settings-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}

.settings-section-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.settings-section-header h3 { font-size: 15px; font-weight: 600; }
.settings-section-header .icon { font-size: 18px; }

.settings-section-body { padding: 20px; }

.form-group {
  margin-bottom: 16px;
}
.form-group:last-child { margin-bottom: 0; }

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--text-secondary);
}

.form-input, .form-select {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  transition: var(--transition);
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.platform-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 8px;
}

.platform-option {
  padding: 12px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}
.platform-option:hover { border-color: var(--border-active); background: var(--bg-hover); }
.platform-option.active { border-color: var(--accent); background: var(--accent-soft); }
.platform-option .name { font-size: 13px; font-weight: 500; }
.platform-option .desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.save-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.save-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* ===== TOOLS PAGE ===== */
.tools-page { max-width: 1000px; margin: 0 auto; }

.tools-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.tools-header h2 { font-size: 20px; font-weight: 600; }

.tools-filter {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 6px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.filter-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.tool-card {
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: var(--transition);
}
.tool-card:hover { border-color: var(--border-active); }

.tool-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.tool-icon { font-size: 24px; }
.tool-name { font-size: 14px; font-weight: 600; }
.tool-plugin { font-size: 10px; padding: 2px 6px; background: var(--accent-soft); border-radius: 4px; color: var(--accent); margin-left: auto; }

.tool-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.tool-example { font-size: 11px; color: var(--text-muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.tool-example code { background: var(--bg-deep); padding: 2px 6px; border-radius: 4px; color: var(--accent); }

/* ===== CHAT PAGE ===== */
.chat-page { display: flex; flex-direction: column; height: 100%; }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message { display: flex; gap: 12px; max-width: 80%; animation: fadeInUp 0.3s ease; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }

.message-avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.message.bot .message-avatar { background: var(--bg-card); border: 1px solid var(--border); }
.message.user .message-avatar { background: var(--user-bubble); }

.message-content {
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.7;
}
.message.bot .message-content { background: var(--bot-bubble); border: 1px solid var(--border); }
.message.user .message-content { background: var(--user-bubble); color: #fff; }

.message-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; display: flex; gap: 12px; }
.message-meta .tag { padding: 2px 8px; background: var(--accent-soft); border-radius: 4px; color: var(--accent); font-size: 10px; font-weight: 500; }

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: var(--bot-bubble);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: fit-content;
}
.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%,60%,100% { transform:translateY(0); opacity:0.4; }
  30% { transform:translateY(-6px); opacity:1; }
}

@keyframes fadeInUp {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}

/* ===== INPUT AREA ===== */
.input-area {
  padding: 16px 24px 24px;
  border-top: 1px solid var(--border);
  background: rgba(17,24,39,0.6);
  backdrop-filter: blur(12px);
}

.input-wrapper { display: flex; gap: 10px; align-items: flex-end; }

.input-wrapper textarea {
  flex: 1;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 120px;
  transition: var(--transition);
  line-height: 1.5;
}
.input-wrapper textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.input-wrapper textarea::placeholder { color: var(--text-muted); }

.send-btn {
  width: 44px;
  height: 44px;
  background: var(--user-bubble);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
  font-size: 18px;
}
.send-btn:hover { transform:scale(1.05); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.quick-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.quick-action {
  padding: 5px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.quick-action:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-active);
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo">🤖</span> Office Agent</h1>
      <button class="new-chat-btn" onclick="newChat()">+ 新建对话</button>
    </div>

    <div class="nav-section">
      <div class="nav-item active" onclick="showPage('chat')">
        <span class="icon">💬</span>
        <span>对话</span>
      </div>
      <div class="nav-item" onclick="showPage('capabilities')">
        <span class="icon">⚡</span>
        <span>功能</span>
        <span class="badge">31</span>
      </div>
      <div class="nav-item" onclick="showPage('tools')">
        <span class="icon">🛠️</span>
        <span>工具列表</span>
      </div>
      <div class="nav-item" onclick="showPage('settings')">
        <span class="icon">⚙️</span>
        <span>设置</span>
      </div>
    </div>

    <div class="session-list" id="sessionList"></div>

    <div class="sidebar-footer">
      <span>v1.0.0</span>
      <span id="statusText">● 已连接</span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="page-container" id="pageContainer"></div>
  </div>
</div>

<script>
// ========== CONSTANTS ==========
const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';

const CAPABILITIES = [
  {
    id: 'calc', icon: '🧮', title: '智能计算', desc: '公式计算、统计分析、货币换算、单位转换、日期计算',
    tools: ['calculate', 'statistics', 'currency_convert', 'unit_convert', 'date_diff']
  },
  {
    id: 'calendar', icon: '📅', title: '日程管理', desc: '查询日程安排、创建会议、设置提醒',
    tools: ['check_calendar', 'schedule_meeting']
  },
  {
    id: 'task', icon: '✅', title: '任务管理', desc: '创建任务、更新状态、查看任务列表',
    tools: ['create_task', 'list_tasks', 'update_task']
  },
  {
    id: 'email', icon: '📧', title: '邮件管理', desc: '发送邮件、搜索邮件、阅读邮件',
    tools: ['send_email', 'search_emails', 'read_email']
  },
  {
    id: 'document', icon: '📄', title: '文档处理', desc: '读取文档、写入文档、搜索文档、文档摘要',
    tools: ['read_document', 'write_document', 'search_documents', 'summarize_document']
  },
  {
    id: 'chart', icon: '📊', title: '图表生成', desc: '柱状图、折线图、饼图、雷达图、散点图',
    tools: ['create_bar_chart', 'create_line_chart', 'create_pie_chart', 'create_radar_chart', 'create_scatter_plot']
  },
  {
    id: 'ppt', icon: '📽️', title: 'PPT生成', desc: '创建PPT、添加幻灯片、嵌入图表、保存PPT',
    tools: ['create_ppt', 'add_slide', 'add_chart_to_ppt', 'save_ppt']
  },
  {
    id: 'knowledge', icon: '📚', title: '知识库', desc: '知识检索、文档问答、添加文档、文档列表',
    tools: ['search_knowledge', 'query_knowledge', 'add_document', 'list_documents']
  },
];

const PLATFORMS = [
  { id: 'dashscope', name: '阿里百炼', desc: 'qwen-plus', models: ['qwen-max', 'qwen-plus', 'qwen-turbo', 'qwen-flash'] },
  { id: 'openai', name: 'OpenAI', desc: 'GPT-4系列', models: ['gpt-4o', 'gpt-4-turbo', 'gpt-4', 'gpt-3.5-turbo'] },
  { id: 'anthropic', name: 'Claude', desc: 'Claude系列', models: ['claude-3-5-sonnet', 'claude-3-opus', 'claude-3-sonnet'] },
  { id: 'gemini', name: 'Gemini', desc: 'Google AI', models: ['gemini-2.0-flash', 'gemini-1.5-pro', 'gemini-1.5-flash'] },
  { id: 'zhipu', name: '智谱AI', desc: 'GLM系列', models: ['glm-4', 'glm-4-plus', 'glm-3-turbo'] },
  { id: 'spark', name: '讯飞星火', desc: 'Spark系列', models: ['spark-4.0', 'spark-3.5', 'spark-3.0'] },
  { id: 'ernie', name: '文心一言', desc: 'ERNIE系列', models: ['ernie-4.0', 'ernie-3.5'] },
  { id: 'doubao', name: '豆包', desc: '字节火山', models: ['doubao-pro', 'doubao-lite'] },
];

const EXAMPLES = {
  calc: ['计算 123 + 456', '100美元换人民币', '统计 [1,2,3,4,5] 的平均值', '100米转英尺'],
  calendar: ['查看今天的日程', '安排明天下午3点会议', '查看这周的所有会议'],
  task: ['创建任务 完成报告 优先级高', '列出所有待办任务', '把 task_001 标记为完成'],
  email: ['搜索包含"项目"的邮件', '发送邮件给张三 主题是会议通知', '查看最新的邮件'],
  document: ['读取文档 report.txt', '搜索包含"总结"的文档', '对文档进行摘要'],
  chart: ['生成柱状图 数据10,20,30', '创建折线图展示趋势', '画一个饼图'],
  ppt: ['创建PPT 项目汇报', '添加一页幻灯片', '在PPT里添加图表'],
  knowledge: ['搜索"机器学习"相关内容', '添加文档到知识库', '列出知识库所有文档'],
};

// ========== STATE ==========
let currentPage = 'capabilities';
let currentSessionId = null;
let sessions = [];
let isLoading = false;

// ========== PAGES ==========
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[onclick="showPage('${page}')"]`);
  if (navItem) navItem.classList.add('active');
  
  const container = document.getElementById('pageContainer');
  
  switch(page) {
    case 'capabilities': renderCapabilitiesPage(container); break;
    case 'tools': renderToolsPage(container); break;
    case 'settings': renderSettingsPage(container); break;
    case 'chat': renderChatPage(container); break;
  }
}

function showCapability(id) {
  const cap = CAPABILITIES.find(c => c.id === id);

  const examples = EXAMPLES[id] || [];
  const input = document.getElementById('userInput');
  if (input) {
    input.value = examples[0] || '';
    input.focus();
    showPage('chat');
  }
}

function getApiBase(platform) {
  const bases = {
    dashscope: 'https://dashscope.aliyuncs.com/compatible-mode/v1',
    openai: 'https://api.openai.com/v1',
    anthropic: 'https://api.anthropic.com',
    gemini: 'https://generativelanguage.googleapis.com/v1beta',
    zhipu: 'https://open.bigmodel.cn/api/paas/v4',
    spark: 'https://spark-api.xf-yun.com/v3.5/chat',
    ernie: 'https://aip.baidubce.com/rpc/2.0/ai_custom/v1',
    doubao: 'https://ark.cn-beijing.volces.com/api/v3',
  };
  return bases[platform] || '';
}

function selectPlatform(id) {
  settings.platform = id;
  const platform = PLATFORMS.find(p => p.id === id);
  settings.model = platform?.models[0] || '';
  renderSettingsPage(document.getElementById('pageContainer'));
}

function updateSetting(key, value) {
  settings[key] = value;
  if (key === 'temperature') {
    document.getElementById('tempValue').textContent = value;
  }
}

function loadSettings() {
  const saved = localStorage.getItem('office_agent_settings');
  if (saved) {
    try {
      settings = { ...settings, ...JSON.parse(saved) };
    } catch(e) {}
  }
}

function saveSettings() {
  settings.model = document.getElementById('modelSelect')?.value || settings.model;
  localStorage.setItem('office_agent_settings', JSON.stringify(settings));
  alert('设置已保存！');
}

          <button class="quick-action" onclick="sendQuick('生成柱状图 数据10,20,30')">📊 图表</button>
          <button class="quick-action" onclick="sendQuick('创建PPT 项目汇报')">📽️ PPT</button>

// ========== CHAT ==========
function newChat() {
  currentSessionId = 'sess_' + Date.now().toString(36);
  sessions.unshift({
    id: currentSessionId,
    title: '新对话',
    time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'})
  });
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById('sessionList');
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="switchSession('${s.id}')">
      <div class="session-title">${s.title}</div>
      <div class="session-time">${s.time}</div>
    </div>
  `).join('');
}

function switchSession(id) {
  currentSessionId = id;
  renderSessions();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);

  showTyping();

  fetch(`${API_URL}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text, session_id: currentSessionId })
  })
  .then(res => res.json())
  .then(data => {
    hideTyping();
    addMessage('bot', data.response, {
      intent: data.intent,
      tool: data.tool_used,
      confidence: data.confidence,
      duration: data.duration_ms
    });
  })
  .catch(e => {
    hideTyping();
    addMessage('bot', '❌ 连接失败，请检查后端服务是否启动。\n\n错误: ' + e.message);
  })
  .finally(() => {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  });
}

function addMessage(role, content, meta = {}) {
  const msgs = document.getElementById('messages');
  if (!msgs) {
    renderChatPage(document.getElementById('pageContainer'));
    var newMsgs = document.getElementById('messages');
  } else {
    var newMsgs = msgs;
  }
  
  const div = document.createElement('div');
  div.className = `message ${role}`;
  
  const avatar = role === 'user' ? '👤' : '🤖';
  const metaHtml = meta.intent ? `
    <div class="message-meta">
      <span class="tag">${meta.intent}</span>
      ${meta.tool ? `<span class="tag">${meta.tool}</span>` : ''}
      ${meta.confidence ? `<span>${Math.round(meta.confidence * 100)}%</span>` : ''}
      ${meta.duration ? `<span>${meta.duration}ms</span>` : ''}
    </div>
  ` : '';

  div.innerHTML = `
    <div class="message-avatar">${avatar}</div>
    <div>
      <div class="message-content">${formatContent(content)}</div>
      ${metaHtml}
    </div>
  `;
  newMsgs.appendChild(div);
  newMsgs.scrollTop = newMsgs.scrollHeight;
}

function formatContent(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg-hover);padding:2px 6px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:12px;">$1</code>');
}

function showTyping() {
  const msgs = document.getElementById('messages');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';
  div.innerHTML = `<div class="message-avatar">🤖</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function sendQuick(text) {
  showPage('chat');
  setTimeout(() => {
    const input = document.getElementById('userInput');
    if (input) {
      input.value = text;
      sendMessage();
    }
  }, 100);
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ========== START ==========
init();
</script>
