<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA-AI - 提示词管理</title>
    <link rel="stylesheet" href="/static/css/admin-unified.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">📝</div>
                    <span class="sidebar-logo-text">DATA-AI</span>
                </div>
                <button class="back-btn" onclick="window.location.href='/'">
                    <span>←</span>
                    <span>返回主页</span>
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">管理中心</div>
                    <div class="nav-item" onclick="window.location.href='/agents'">
                        <span class="nav-item-icon">🤖</span>
                        <span class="nav-item-text">智能体</span>
                    </div>
                    <div class="nav-item active" onclick="showView('prompts')">
                        <span class="nav-item-icon">📝</span>
                        <span class="nav-item-text">提示词</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/skills'">
                        <span class="nav-item-icon">⚡</span>
                        <span class="nav-item-text">技能</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/mcp'">
                        <span class="nav-item-icon">🔌</span>
                        <span class="nav-item-text">MCP</span>
                    </div>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">我的提示词</div>
                    <div id="prompt-nav-list"></div>
                </div>
            </div>
        </div>
        
        <div class="admin-main">
            <div class="admin-topbar">
                <div class="admin-topbar-left">
                    <h1 class="admin-title" id="view-title">提示词管理</h1>
                </div>
                <div class="admin-topbar-right">
                    <button class="btn" onclick="importData()">
                        <span>📥</span> 导入
                    </button>
                    <button class="btn" onclick="exportData()">
                        <span>📤</span> 导出
                    </button>
                    <button class="btn btn-primary" onclick="createNew()">
                        <span>＋</span> 新建提示词
                    </button>
                </div>
            </div>
            
            <div class="admin-content" id="content-area">
                <div id="list-view">
                    <div class="list-header">
                        <div class="search-box">
                            <span>🔍</span>
                            <input type="text" placeholder="搜索提示词..." id="search-input" oninput="filterPrompts()">
                        </div>
                    </div>
                    <div class="list-grid" id="prompts-grid"></div>
                </div>
                
                <div id="detail-view" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <script>
        let prompts = [
            {
                id: '1',
                name: '代码优化大师',
                icon: '⚡',
                description: '优化和重构现有代码',
                category: '代码',
                variables: ['code', 'language', 'goal'],
                content: '请优化以下代码，目标：{{goal}}\n语言：{{language}}\n代码：\n{{code}}\n\n请提供优化后的代码和改进说明。'
            },
            {
                id: '2',
                name: '邮件写作助手',
                icon: '✉️',
                description: '帮助您写专业邮件',
                category: '写作',
                variables: ['recipient', 'purpose', 'tone'],
                content: '请帮我写一封邮件。\n收件人：{{recipient}}\n目的：{{purpose}}\n语气：{{tone}}'
            },
            {
                id: '3',
                name: '翻译专家',
                icon: '🌐',
                description: '准确翻译并保持原意',
                category: '语言',
                variables: ['text', 'source', 'target', 'style'],
                content: '请将以下文本从 {{source}} 翻译为 {{target}}。\n文本：\n{{text}}\n风格：{{style}}'
            },
            {
                id: '4',
                name: '代码审查专家',
                icon: '🔍',
                description: '全面的代码审查',
                category: '代码',
                variables: ['code', 'language'],
                content: '请对以下代码进行全面审查。\n语言：{{language}}\n代码：\n{{code}}'
            }
        ];
        
        let currentPrompt = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            renderPromptsList(prompts);
            renderPromptNav();
        });
        
        function renderPromptsList(list) {
            const grid = document.getElementById('prompts-grid');
            if (list.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">📝</div>
                        <div class="empty-title">暂无提示词</div>
                        <div class="empty-desc">点击"新建提示词"创建一个</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = list.map(p => `
                <div class="card" onclick="showDetail('${p.id}')">
                    <div class="card-icon">${p.icon}</div>
                    <div class="card-title">${p.name}</div>
                    <div class="card-desc">${p.description}</div>
                    <div class="card-tags">
                        <span class="tag">${p.category}</span>
                        <span class="tag">${p.variables.length} 个变量</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderPromptNav() {
            const nav = document.getElementById('prompt-nav-list');
            nav.innerHTML = prompts.map(p => `
                <div class="nav-item" onclick="showDetail('${p.id}')" style="padding: 8px 16px; font-size: 13px;">
                    <span>${p.icon}</span>
                    <span>${p.name}</span>
                </div>
            `).join('');
        }
        
        function filterPrompts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = prompts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.description.toLowerCase().includes(query)
            );
            renderPromptsList(filtered);
        }
        
        function showDetail(id) {
            currentPrompt = prompts.find(p => p.id === id);
            if (!currentPrompt) return;
            
            document.getElementById('view-title').textContent = currentPrompt.name;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            document.getElementById('detail-view').innerHTML = `
                <div class="detail-header">
                    <div class="detail-icon">${currentPrompt.icon}</div>
                    <div>
                        <div class="detail-title">${currentPrompt.name}</div>
                        <div class="detail-desc">${currentPrompt.description}</div>
                    </div>
                    <button class="btn" onclick="showList()" style="margin-left: auto;">
                        ← 返回列表
                    </button>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">📋 基本信息</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">名称</label>
                            <input type="text" class="form-input" id="prompt-name" value="${currentPrompt.name}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">图标</label>
                            <input type="text" class="form-input" id="prompt-icon" value="${currentPrompt.icon}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">分类</label>
                            <select class="form-select" id="prompt-category">
                                <option value="代码" ${currentPrompt.category === '代码' ? 'selected' : ''}>代码</option>
                                <option value="写作" ${currentPrompt.category === '写作' ? 'selected' : ''}>写作</option>
                                <option value="语言" ${currentPrompt.category === '语言' ? 'selected' : ''}>语言</option>
                                <option value="数据" ${currentPrompt.category === '数据' ? 'selected' : ''}>数据</option>
                                <option value="其他" ${currentPrompt.category === '其他' ? 'selected' : ''}>其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述</label>
                            <input type="text" class="form-input" id="prompt-desc" value="${currentPrompt.description}">
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">🏷️ 变量配置</div>
                    <div class="form-group">
                        <label class="form-label">变量（用逗号分隔）</label>
                        <input type="text" class="form-input" id="prompt-vars" value="${currentPrompt.variables.join(', ')}" placeholder="code, language, goal">
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">✏️ 提示词内容</div>
                    <div class="code-editor">
                        <div class="code-editor-header">
                            <div class="code-dot code-dot-red"></div>
                            <div class="code-dot code-dot-yellow"></div>
                            <div class="code-dot code-dot-green"></div>
                            <span class="code-editor-title">prompt-template.md</span>
                        </div>
                        <div class="code-editor-body">
                            <textarea class="code-textarea" id="prompt-content" style="min-height: 250px;">${currentPrompt.content}</textarea>
                        </div>
                    </div>
                    <div style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">
                        💡 使用 {{变量名}} 语法定义可替换的变量
                    </div>
                </div>
                
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-primary" onclick="savePrompt()">
                        💾 保存更改
                    </button>
                    <button class="btn" onclick="copyPrompt()">
                        📋 复制
                    </button>
                    <button class="btn" onclick="testPrompt()">
                        🧪 测试
                    </button>
                    <button class="btn" onclick="deletePrompt()" style="margin-left: auto; color: var(--danger);">
                        🗑️ 删除
                    </button>
                </div>
                
                <div class="test-section" style="margin-top: 20px;">
                    <div class="test-header">🧪 预览渲染结果</div>
                    <div id="test-vars"></div>
                    <div class="test-output" id="test-output" style="margin-top: 12px;">// 渲染预览将显示在这里...</div>
                </div>
            `;
            
            renderTestVars();
        }
        
        function renderTestVars() {
            const container = document.getElementById('test-vars');
            if (!currentPrompt || currentPrompt.variables.length === 0) return;
            
            container.innerHTML = currentPrompt.variables.map(v => `
                <div class="form-group" style="margin-bottom: 8px;">
                    <label class="form-label">${v}</label>
                    <input type="text" class="form-input" id="test-${v}" placeholder="请输入 ${v}">
                </div>
            `).join('');
        }
        
        function showList() {
            document.getElementById('view-title').textContent = '提示词管理';
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            currentPrompt = null;
        }
        
        function createNew() {
            const newPrompt = {
                id: Date.now().toString(),
                name: '新提示词',
                icon: '📝',
                description: '请描述这个提示词的功能',
                category: '其他',
                variables: [],
                content: '请输入您的提示词内容...'
            };
            prompts.unshift(newPrompt);
            renderPromptsList(prompts);
            renderPromptNav();
            showDetail(newPrompt.id);
        }
        
        function savePrompt() {
            if (!currentPrompt) return;
            
            currentPrompt.name = document.getElementById('prompt-name').value;
            currentPrompt.icon = document.getElementById('prompt-icon').value;
            currentPrompt.category = document.getElementById('prompt-category').value;
            currentPrompt.description = document.getElementById('prompt-desc').value;
            currentPrompt.variables = document.getElementById('prompt-vars').value.split(',').map(v => v.trim()).filter(v => v);
            currentPrompt.content = document.getElementById('prompt-content').value;
            
            renderPromptsList(prompts);
            renderPromptNav();
            showDetail(currentPrompt.id);
            alert('✅ 提示词已保存！');
        }
        
        function copyPrompt() {
            if (!currentPrompt) return;
            navigator.clipboard.writeText(currentPrompt.content);
            alert('✅ 已复制到剪贴板！');
        }
        
        function testPrompt() {
            if (!currentPrompt) return;
            
            let content = currentPrompt.content;
            currentPrompt.variables.forEach(v => {
                const input = document.getElementById(`test-${v}`);
                const value = input ? input.value || `{${v}}` : `{${v}}`;
                content = content.split(`{{${v}}}`).join(value);
            });
            
            document.getElementById('test-output').textContent = content;
        }
        
        function deletePrompt() {
            if (!currentPrompt) return;
            if (!confirm(`确定要删除 "${currentPrompt.name}" 吗？`)) return;
            
            prompts = prompts.filter(p => p.id !== currentPrompt.id);
            renderPromptsList(prompts);
            renderPromptNav();
            showList();
        }
        
        function importData() {
            alert('📥 导入功能将在未来版本中提供！');
        }
        
        function exportData() {
            const data = JSON.stringify(prompts, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'prompts.json';
            a.click();
        }
    </script>
</body>
</html>
