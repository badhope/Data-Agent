<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA-AI - 设置</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9fafb;
            color: #1f2937;
            min-height: 100vh;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e5e7eb;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .logo-text {
            font-size: 18px;
            font-weight: 700;
        }
        .back-btn {
            margin-top: 12px;
            padding: 10px 16px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            text-align: left;
        }
        .back-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .nav {
            padding: 12px;
        }
        .nav-group-title {
            font-size: 12px;
            color: #6b7280;
            padding: 12px 8px 8px;
            text-transform: uppercase;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            color: #4b5563;
        }
        .nav-item:hover {
            background: #f3f4f6;
            color: #111827;
        }
        .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }
        .main {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }
        .page-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .section {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .provider-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .provider-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .provider-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .provider-card.configured {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }
        .provider-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .provider-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .provider-name {
            font-size: 15px;
            font-weight: 600;
        }
        .provider-status {
            font-size: 12px;
            color: #6b7280;
        }
        .provider-models {
            font-size: 13px;
            color: #9ca3af;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            background: white;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .doc-link {
            margin-left: auto;
            color: #3b82f6;
            text-decoration: none;
        }
        .model-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .model-item.default {
            border: 1px solid #3b82f6;
        }
        .model-name {
            font-weight: 500;
        }
        .model-info {
            font-size: 12px;
            color: #6b7280;
        }
        .badge {
            font-size: 11px;
            padding: 2px 8px;
            background: #3b82f6;
            color: white;
            border-radius: 4px;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: fixed;
                transform: translateX(-100%);
                z-index: 100;
            }
            .sidebar.show {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🤖</div>
                    <span class="logo-text">DATA-AI</span>
                </div>
                <button class="back-btn" onclick="window.location.href='/'">← 返回主页</button>
            </div>
            <div class="nav">
                <div class="nav-group-title">模型配置</div>
                <div class="nav-item active" onclick="showPage('providers')">
                    <span>🔌</span>
                    <span>模型提供商</span>
                </div>
                <div class="nav-item" onclick="showPage('configured')">
                    <span>✅</span>
                    <span>已配置模型</span>
                </div>
                <div class="nav-group-title">通用设置</div>
                <div class="nav-item" onclick="showPage('general')">
                    <span>⚙️</span>
                    <span>通用设置</span>
                </div>
                <div class="nav-item" onclick="showPage('appearance')">
                    <span>🎨</span>
                    <span>外观</span>
                </div>
            </div>
        </div>
        <div class="main">
            <div id="page-providers">
                <h1 class="page-title">🔌 模型提供商</h1>
                
                <div class="section">
                    <div class="section-title">🇨🇳 国内厂商</div>
                    <div class="provider-grid" id="domestic-providers"></div>
                </div>
                
                <div class="section">
                    <div class="section-title">🌍 国外厂商</div>
                    <div class="provider-grid" id="international-providers"></div>
                </div>
                
                <div class="section">
                    <div class="section-title">🏠 本地模型</div>
                    <div class="provider-grid" id="local-providers"></div>
                </div>
            </div>
            
            <div id="page-configured" class="hidden">
                <h1 class="page-title">✅ 已配置模型</h1>
                <div id="configured-models"></div>
            </div>
            
            <div id="page-general" class="hidden">
                <h1 class="page-title">⚙️ 通用设置</h1>
                <div class="section">
                    <div class="form-group">
                        <label class="form-label">默认模型</label>
                        <select class="form-select" id="default-model">
                            <option value="">请先配置模型</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div id="page-appearance" class="hidden">
                <h1 class="page-title">🎨 外观设置</h1>
                <div class="section">
                    <p>暂未实现</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="config-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">配置模型</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>
    
    <script>
        const providers = {
            domestic: [
                { id: 'baidu_wenxin', name: '百度文心一言', icon: '🌐', models: ['ernie-4.0-8k', 'ernie-3.5-8k', 'ernie-speed-8k'], doc: 'https://cloud.baidu.com/doc/WENXINWORKSHOP/s/hf1uw2kav' },
                { id: 'aliyun_qwen', name: '阿里云通义千问', icon: '☁️', models: ['qwen-max', 'qwen-plus', 'qwen-turbo'], doc: 'https://help.aliyun.com/zh/dashscope/' },
                { id: 'tencent_hunyuan', name: '腾讯混元', icon: '🐧', models: ['hunyuan', 'hunyuan-pro', 'hunyuan-standard'], doc: 'https://cloud.tencent.com/document/product/1729' },
                { id: 'bytedance_doubao', name: '字节豆包', icon: '🎵', models: ['doubao-pro-32k', 'doubao-lite-32k'], doc: 'https://www.volcengine.com/docs/82379/1399008' },
                { id: 'zhipu_glm', name: '智谱 GLM', icon: '🧠', models: ['glm-4-plus', 'glm-4', 'glm-3-turbo'], doc: 'https://open.bigmodel.cn/doc/api' },
                { id: 'moonshot_kimi', name: '月之暗面 Kimi', icon: '🌙', models: ['moonshot-v1-128k', 'moonshot-v1-32k'], doc: 'https://platform.moonshot.cn/docs' },
                { id: 'deepseek', name: '深度求索 DeepSeek', icon: '🔍', models: ['deepseek-chat', 'deepseek-coder'], doc: 'https://platform.deepseek.com/docs' },
            ],
            international: [
                { id: 'openai', name: 'OpenAI', icon: '🤖', models: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo'], doc: 'https://platform.openai.com/docs' },
                { id: 'anthropic', name: 'Anthropic Claude', icon: '🧬', models: ['claude-3-5-sonnet-20241022', 'claude-3-opus-20240229'], doc: 'https://docs.anthropic.com/claude/reference' },
                { id: 'google_gemini', name: 'Google Gemini', icon: '💎', models: ['gemini-2.0-flash-exp', 'gemini-1.5-pro'], doc: 'https://ai.google.dev/docs' },
            ],
            local: [
                { id: 'ollama', name: 'Ollama 本地模型', icon: '🏠', models: ['llama3.1:8b', 'qwen2.5:7b', 'deepseek-coder-v2:16b'], doc: 'https://github.com/ollama/ollama' },
            ]
        };
        
        let configuredModels = JSON.parse(localStorage.getItem('configuredModels') || '[]');
        
        document.addEventListener('DOMContentLoaded', () => {
            renderAllProviders();
            renderConfiguredModels();
        });
        
        function renderAllProviders() {
            document.getElementById('domestic-providers').innerHTML = 
                providers.domestic.map(p => createCard(p)).join('');
            document.getElementById('international-providers').innerHTML = 
                providers.international.map(p => createCard(p)).join('');
            document.getElementById('local-providers').innerHTML = 
                providers.local.map(p => createCard(p)).join('');
        }
        
        function createCard(provider) {
            const isConfigured = configuredModels.some(m => m.provider === provider.id);
            return `
                <div class="provider-card ${isConfigured ? 'configured' : ''}" onclick="openConfig('${provider.id}')">
                    <div class="provider-header">
                        <div class="provider-icon">${provider.icon}</div>
                        <div>
                            <div class="provider-name">${provider.name}</div>
                            <div class="provider-status">${isConfigured ? '✅ 已配置' : '未配置'}</div>
                        </div>
                    </div>
                    <div class="provider-models">${provider.models.length} 个模型</div>
                </div>
            `;
        }
        
        function renderConfiguredModels() {
            const container = document.getElementById('configured-models');
            if (configuredModels.length === 0) {
                container.innerHTML = `
                    <div class="section">
                        <p style="text-align: center; color: #6b7280;">暂无配置</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = `
                <div class="section">
                    ${configuredModels.map(m => `
                        <div class="model-item ${m.isDefault ? 'default' : ''}">
                            <div>
                                <div class="model-name">${m.name}</div>
                                <div class="model-info">${m.provider} · ${m.model}</div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                ${m.isDefault ? '<span class="badge">默认</span>' : ''}
                                <button class="btn" onclick="setDefault('${m.id}')">设为默认</button>
                                <button class="btn" onclick="removeModel('${m.id}')" style="color: #ef4444;">删除</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function showPage(page) {
            document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-item')?.classList.add('active');
        }
        
        function openConfig(providerId) {
            const all = [...providers.domestic, ...providers.international, ...providers.local];
            const provider = all.find(p => p.id === providerId);
            if (!provider) return;
            
            document.getElementById('modal-title').textContent = `配置 ${provider.name}`;
            
            let extra = '';
            if (providerId === 'ollama') {
                extra = `
                    <div class="form-group">
                        <label class="form-label">Ollama 地址</label>
                        <input type="text" class="form-input" id="base-url" value="http://localhost:11434/v1">
                    </div>
                `;
            } else {
                extra = `
                    <div class="form-group">
                        <label class="form-label">API Key</label>
                        <input type="password" class="form-input" id="api-key" placeholder="输入 API Key">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Base URL（可选）</label>
                        <input type="text" class="form-input" id="base-url" placeholder="使用默认地址">
                    </div>
                `;
            }
            
            document.getElementById('modal-content').innerHTML = `
                <div class="form-group">
                    <label class="form-label">配置名称</label>
                    <input type="text" class="form-input" id="config-name" value="${provider.name}">
                </div>
                <div class="form-group">
                    <label class="form-label">选择模型</label>
                    <select class="form-select" id="selected-model">
                        ${provider.models.map(m => `<option value="${m}">${m}</option>`).join('')}
                    </select>
                </div>
                ${extra}
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="is-default">
                        <span>设为默认模型</span>
                    </label>
                </div>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="saveConfig('${providerId}')">💾 保存</button>
                    <button class="btn" onclick="closeModal()">取消</button>
                    <a href="${provider.doc}" target="_blank" class="doc-link">📖 查看文档</a>
                </div>
            `;
            document.getElementById('config-modal').classList.add('show');
        }
        
        function saveConfig(providerId) {
            const newModel = {
                id: Date.now().toString(),
                name: document.getElementById('config-name').value,
                provider: providerId,
                model: document.getElementById('selected-model').value,
                apiKey: document.getElementById('api-key')?.value || '',
                baseUrl: document.getElementById('base-url')?.value || '',
                isDefault: document.getElementById('is-default')?.checked || false
            };
            
            if (newModel.isDefault) {
                configuredModels.forEach(m => m.isDefault = false);
            }
            
            configuredModels.push(newModel);
            localStorage.setItem('configuredModels', JSON.stringify(configuredModels));
            
            closeModal();
            renderAllProviders();
            renderConfiguredModels();
            alert('✅ 配置已保存！');
        }
        
        function closeModal() {
            document.getElementById('config-modal').classList.remove('show');
        }
        
        function setDefault(id) {
            configuredModels.forEach(m => m.isDefault = m.id === id);
            localStorage.setItem('configuredModels', JSON.stringify(configuredModels));
            renderConfiguredModels();
            renderAllProviders();
        }
        
        function removeModel(id) {
            if (!confirm('确定要删除这个配置吗？')) return;
            configuredModels = configuredModels.filter(m => m.id !== id);
            localStorage.setItem('configuredModels', JSON.stringify(configuredModels));
            renderAllProviders();
            renderConfiguredModels();
        }
        
        document.getElementById('config-modal').addEventListener('click', (e) => {
            if (e.target.id === 'config-modal') closeModal();
        });
    </script>
</body>
</html>
