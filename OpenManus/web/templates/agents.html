<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA-AI - 智能体管理</title>
    <link rel="stylesheet" href="/static/css/admin-unified.css">
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <div class="admin-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">🤖</div>
                    <span class="sidebar-logo-text">DATA-AI</span>
                </div>
                <button class="back-btn" onclick="window.location.href='/'">
                    <span>←</span>
                    <span>返回主页</span>
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">管理中心</div>
                    <div class="nav-item active" onclick="showView('agents')">
                        <span class="nav-item-icon">🤖</span>
                        <span class="nav-item-text">智能体</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/prompts'">
                        <span class="nav-item-icon">📝</span>
                        <span class="nav-item-text">提示词</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/skills'">
                        <span class="nav-item-icon">⚡</span>
                        <span class="nav-item-text">技能</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/mcp'">
                        <span class="nav-item-icon">🔌</span>
                        <span class="nav-item-text">MCP</span>
                    </div>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">我的智能体</div>
                    <div id="agent-nav-list"></div>
                </div>
            </div>
        </div>
        
        <!-- 主内容 -->
        <div class="admin-main">
            <!-- 顶部栏 -->
            <div class="admin-topbar">
                <div class="admin-topbar-left">
                    <button class="btn btn-secondary" onclick="window.location.href='/'" style="margin-right: 16px;">
                        <span>←</span> 返回主页
                    </button>
                    <h1 class="admin-title" id="view-title">智能体管理</h1>
                </div>
                <div class="admin-topbar-right">
                    <button class="btn" onclick="exportData()">
                        <span>📤</span> 导出
                    </button>
                    <button class="btn btn-primary" onclick="createNew()">
                        <span>＋</span> 新建智能体
                    </button>
                </div>
            </div>
            
            <!-- 内容区 -->
            <div class="admin-content" id="content-area">
                <!-- 列表视图 -->
                <div id="list-view">
                    <div class="list-header">
                        <div class="search-box">
                            <span>🔍</span>
                            <input type="text" placeholder="搜索智能体..." id="search-input" oninput="filterAgents()">
                        </div>
                    </div>
                    <div class="list-grid" id="agents-grid"></div>
                </div>
                
                <!-- 详情视图 -->
                <div id="detail-view" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 智能体数据
        let agents = [
            {
                id: '1',
                name: '代码助手',
                icon: '👨‍💻',
                description: '专业的代码编写、调试和优化助手',
                tags: ['代码', '开发'],
                visibility: 'public',
                model: 'gpt-4',
                temperature: 0.7,
                prompt: '你是一个专业的代码助手。你擅长编写、调试和优化各种编程语言的代码。',
                tools: ['python-execute', 'search']
            },
            {
                id: '2',
                name: '写作助手',
                icon: '✍️',
                description: '帮助您创作文章、邮件和各类文档',
                tags: ['写作', '文案'],
                visibility: 'private',
                model: 'gpt-3.5-turbo',
                temperature: 0.8,
                prompt: '你是一个专业的写作助手，擅长创作高质量的文章、邮件和文案。',
                tools: []
            },
            {
                id: '3',
                name: '数据分析师',
                icon: '📊',
                description: '数据分析和可视化专家',
                tags: ['数据', '分析'],
                visibility: 'public',
                model: 'gpt-4',
                temperature: 0.6,
                prompt: '你是一个专业的数据分析师，擅长解读数据、发现趋势并创建可视化。',
                tools: ['python-execute', 'data-viz']
            },
            {
                id: '4',
                name: '病理分析助手',
                icon: '🔬',
                description: 'SlideFlow 病理学图像分析专家',
                tags: ['病理', '医学'],
                visibility: 'private',
                model: 'gpt-4',
                temperature: 0.5,
                prompt: '你是一个专业的病理分析助手，擅长分析病理图像和提供医学见解。',
                tools: ['slideflow', 'image-analysis']
            }
        ];
        
        let currentAgent = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderAgentsList(agents);
            renderAgentNav();
        });
        
        // 渲染智能体列表
        function renderAgentsList(list) {
            const grid = document.getElementById('agents-grid');
            if (list.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">🤖</div>
                        <div class="empty-title">暂无智能体</div>
                        <div class="empty-desc">点击"新建智能体"创建一个</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = list.map(agent => `
                <div class="card" onclick="showDetail('${agent.id}')">
                    <div class="card-icon">${agent.icon}</div>
                    <div class="card-title">${agent.name}</div>
                    <div class="card-desc">${agent.description}</div>
                    <div class="card-tags">
                        ${agent.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        <span class="tag ${agent.visibility === 'public' ? 'tag-success' : ''}">${agent.visibility === 'public' ? '公开' : '私有'}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // 渲染侧边栏导航
        function renderAgentNav() {
            const nav = document.getElementById('agent-nav-list');
            nav.innerHTML = agents.map(a => `
                <div class="nav-item" onclick="showDetail('${a.id}')" style="padding: 8px 16px; font-size: 13px;">
                    <span>${a.icon}</span>
                    <span>${a.name}</span>
                </div>
            `).join('');
        }
        
        // 筛选
        function filterAgents() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = agents.filter(a => 
                a.name.toLowerCase().includes(query) || 
                a.description.toLowerCase().includes(query)
            );
            renderAgentsList(filtered);
        }
        
        // 显示详情
        function showDetail(id) {
            currentAgent = agents.find(a => a.id === id);
            if (!currentAgent) return;
            
            document.getElementById('view-title').textContent = currentAgent.name;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            document.getElementById('detail-view').innerHTML = `
                <div class="detail-header">
                    <div class="detail-icon">${currentAgent.icon}</div>
                    <div>
                        <div class="detail-title">${currentAgent.name}</div>
                        <div class="detail-desc">${currentAgent.description}</div>
                    </div>
                    <button class="btn" onclick="showList()" style="margin-left: auto;">
                        ← 返回列表
                    </button>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">📋 基本信息</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">名称</label>
                            <input type="text" class="form-input" id="agent-name" value="${currentAgent.name}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">图标</label>
                            <input type="text" class="form-input" id="agent-icon" value="${currentAgent.icon}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" class="form-input" id="agent-desc" value="${currentAgent.description}">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">可见性</label>
                            <select class="form-select" id="agent-visibility">
                                <option value="public" ${currentAgent.visibility === 'public' ? 'selected' : ''}>公开</option>
                                <option value="private" ${currentAgent.visibility === 'private' ? 'selected' : ''}>私有</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">标签</label>
                            <input type="text" class="form-input" id="agent-tags" value="${currentAgent.tags.join(', ')}">
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">⚙️ 模型配置</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">模型</label>
                            <select class="form-select" id="agent-model">
                                <option value="gpt-4" ${currentAgent.model === 'gpt-4' ? 'selected' : ''}>GPT-4</option>
                                <option value="gpt-3.5-turbo" ${currentAgent.model === 'gpt-3.5-turbo' ? 'selected' : ''}>GPT-3.5 Turbo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">温度: <span id="temp-value">${currentAgent.temperature}</span></label>
                            <input type="range" class="form-input" id="agent-temp" value="${currentAgent.temperature}" min="0" max="2" step="0.1" oninput="document.getElementById('temp-value').textContent = this.value">
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">📝 系统提示词</div>
                    <div class="code-editor">
                        <div class="code-editor-header">
                            <div class="code-dot code-dot-red"></div>
                            <div class="code-dot code-dot-yellow"></div>
                            <div class="code-dot code-dot-green"></div>
                            <span class="code-editor-title">system-prompt.txt</span>
                        </div>
                        <div class="code-editor-body">
                            <textarea class="code-textarea" id="agent-prompt">${currentAgent.prompt}</textarea>
                        </div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-primary" onclick="saveAgent()">
                        💾 保存更改
                    </button>
                    <button class="btn" onclick="testAgent()">
                        🧪 测试
                    </button>
                    <button class="btn" onclick="deleteAgent()" style="margin-left: auto; color: var(--danger);">
                        🗑️ 删除
                    </button>
                </div>
                
                <div class="test-section" style="margin-top: 20px;">
                    <div class="test-header">🧪 测试此智能体</div>
                    <div class="test-input-group">
                        <input type="text" class="test-input" id="test-input" placeholder="输入测试消息...">
                        <button class="btn btn-primary" onclick="runTest()">发送</button>
                    </div>
                    <div class="test-output" id="test-output">// 测试输出将显示在这里...</div>
                </div>
            `;
        }
        
        // 返回列表
        function showList() {
            document.getElementById('view-title').textContent = '智能体管理';
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            currentAgent = null;
        }
        
        // 新建
        function createNew() {
            const newAgent = {
                id: Date.now().toString(),
                name: '新智能体',
                icon: '🤖',
                description: '请描述这个智能体的功能',
                tags: ['新'],
                visibility: 'private',
                model: 'gpt-3.5-turbo',
                temperature: 0.7,
                prompt: '你是一个有帮助的AI助手。',
                tools: []
            };
            agents.unshift(newAgent);
            renderAgentsList(agents);
            renderAgentNav();
            showDetail(newAgent.id);
        }
        
        // 保存
        function saveAgent() {
            if (!currentAgent) return;
            
            currentAgent.name = document.getElementById('agent-name').value;
            currentAgent.icon = document.getElementById('agent-icon').value;
            currentAgent.description = document.getElementById('agent-desc').value;
            currentAgent.visibility = document.getElementById('agent-visibility').value;
            currentAgent.tags = document.getElementById('agent-tags').value.split(',').map(t => t.trim());
            currentAgent.model = document.getElementById('agent-model').value;
            currentAgent.temperature = parseFloat(document.getElementById('agent-temp').value);
            currentAgent.prompt = document.getElementById('agent-prompt').value;
            
            renderAgentsList(agents);
            renderAgentNav();
            showDetail(currentAgent.id);
            
            alert('✅ 智能体已保存！');
        }
        
        // 测试
        function testAgent() {
            document.getElementById('test-input').value = '你好，请介绍一下你自己！';
            runTest();
        }
        
        function runTest() {
            const input = document.getElementById('test-input').value;
            const output = document.getElementById('test-output');
            
            if (!input.trim()) return;
            
            output.textContent = `// 发送: ${input}\n\n// 正在思考...\n`;
            
            setTimeout(() => {
                output.textContent += `\n// 收到回复!\n\n你好！我是 ${currentAgent.name}。\n${currentAgent.description}\n\n有什么可以帮你的吗？`;
            }, 800);
        }
        
        // 删除
        function deleteAgent() {
            if (!currentAgent) return;
            if (!confirm(`确定要删除 "${currentAgent.name}" 吗？`)) return;
            
            agents = agents.filter(a => a.id !== currentAgent.id);
            renderAgentsList(agents);
            renderAgentNav();
            showList();
        }
        
        // 导出
        function exportData() {
            const data = JSON.stringify(agents, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'agents.json';
            a.click();
        }
    </script>
</body>
</html>
