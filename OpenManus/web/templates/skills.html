<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA-AI - 技能管理</title>
    <link rel="stylesheet" href="/static/css/admin-unified.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">⚡</div>
                    <span class="sidebar-logo-text">DATA-AI</span>
                </div>
                <button class="back-btn" onclick="window.location.href='/'">
                    <span>←</span>
                    <span>返回主页</span>
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">管理中心</div>
                    <div class="nav-item" onclick="window.location.href='/agents'">
                        <span class="nav-item-icon">🤖</span>
                        <span class="nav-item-text">智能体</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/prompts'">
                        <span class="nav-item-icon">📝</span>
                        <span class="nav-item-text">提示词</span>
                    </div>
                    <div class="nav-item active" onclick="showView('skills')">
                        <span class="nav-item-icon">⚡</span>
                        <span class="nav-item-text">技能</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/mcp'">
                        <span class="nav-item-icon">🔌</span>
                        <span class="nav-item-text">MCP</span>
                    </div>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">我的技能</div>
                    <div id="skill-nav-list"></div>
                </div>
            </div>
        </div>
        
        <div class="admin-main">
            <div class="admin-topbar">
                <div class="admin-topbar-left">
                    <h1 class="admin-title" id="view-title">技能管理</h1>
                </div>
                <div class="admin-topbar-right">
                    <button class="btn" onclick="generateWithAI()">
                        <span>✨</span> AI 生成
                    </button>
                    <button class="btn btn-primary" onclick="createNew()">
                        <span>＋</span> 新建技能
                    </button>
                </div>
            </div>
            
            <div class="admin-content" id="content-area">
                <div id="list-view">
                    <div class="list-header">
                        <div class="search-box">
                            <span>🔍</span>
                            <input type="text" placeholder="搜索技能..." id="search-input" oninput="filterSkills()">
                        </div>
                    </div>
                    <div class="list-grid" id="skills-grid"></div>
                </div>
                
                <div id="detail-view" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <script>
        let skills = [
            {
                id: '1',
                name: '数据分析助手',
                icon: '📊',
                description: '自动分析数据并生成报告',
                category: '数据',
                version: '1.2.0',
                status: 'active',
                steps: [
                    { step: 1, name: '获取数据', desc: '从数据源读取数据' },
                    { step: 2, name: '清洗数据', desc: '数据清洗和预处理' },
                    { step: 3, name: '分析数据', desc: '执行统计分析' },
                    { step: 4, name: '生成报告', desc: '生成可视化报告' }
                ],
                code: 'def analyze_data(data):\n    df = pd.read_csv(data)\n    summary = df.describe()\n    return summary'
            },
            {
                id: '2',
                name: '文档翻译助手',
                icon: '🌐',
                description: '翻译各种格式的文档',
                category: '语言',
                version: '2.0.1',
                status: 'active',
                steps: [
                    { step: 1, name: '读取文档', desc: '解析并提取文档内容' },
                    { step: 2, name: '分段翻译', desc: '智能分段进行翻译' },
                    { step: 3, name: '格式保持', desc: '保持原文档格式' }
                ],
                code: 'def translate_document(doc, source, target):\n    content = parse_document(doc)\n    translated = translate_text(content)\n    return reconstructed'
            },
            {
                id: '3',
                name: '代码审查工作流',
                icon: '🔍',
                description: '完整的代码审查流程自动化',
                category: '开发',
                version: '1.5.0',
                status: 'draft',
                steps: [
                    { step: 1, name: '代码扫描', desc: '静态代码分析' },
                    { step: 2, name: '问题检测', desc: '检测潜在问题' },
                    { step: 3, name: '报告生成', desc: '输出审查报告' }
                ],
                code: 'def code_review(code):\n    issues = static_analyze(code)\n    return issues'
            }
        ];
        
        let currentSkill = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            renderSkillsList(skills);
            renderSkillNav();
        });
        
        function renderSkillsList(list) {
            const grid = document.getElementById('skills-grid');
            if (list.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">⚡</div>
                        <div class="empty-title">暂无技能</div>
                        <div class="empty-desc">点击"新建技能"创建一个</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = list.map(s => `
                <div class="card" onclick="showDetail('${s.id}')">
                    <div class="card-icon">${s.icon}</div>
                    <div class="card-title">${s.name}</div>
                    <div class="card-desc">${s.description}</div>
                    <div class="card-tags">
                        <span class="tag">${s.category}</span>
                        <span class="tag">v${s.version}</span>
                        <span class="tag ${s.status === 'active' ? 'tag-success' : ''}">${s.status === 'active' ? '已启用' : '草稿'}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderSkillNav() {
            const nav = document.getElementById('skill-nav-list');
            nav.innerHTML = skills.map(s => `
                <div class="nav-item" onclick="showDetail('${s.id}')" style="padding: 8px 16px; font-size: 13px;">
                    <span>${s.icon}</span>
                    <span>${s.name}</span>
                </div>
            `).join('');
        }
        
        function filterSkills() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = skills.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.description.toLowerCase().includes(query)
            );
            renderSkillsList(filtered);
        }
        
        function showDetail(id) {
            currentSkill = skills.find(s => s.id === id);
            if (!currentSkill) return;
            
            document.getElementById('view-title').textContent = currentSkill.name;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            document.getElementById('detail-view').innerHTML = `
                <div class="detail-header">
                    <div class="detail-icon">${currentSkill.icon}</div>
                    <div>
                        <div class="detail-title">${currentSkill.name}</div>
                        <div class="detail-desc">${currentSkill.description} · v${currentSkill.version}</div>
                    </div>
                    <button class="btn" onclick="showList()" style="margin-left: auto;">
                        ← 返回列表
                    </button>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">📋 基本信息</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">名称</label>
                            <input type="text" class="form-input" id="skill-name" value="${currentSkill.name}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">图标</label>
                            <input type="text" class="form-input" id="skill-icon" value="${currentSkill.icon}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">分类</label>
                            <select class="form-select" id="skill-category">
                                <option value="数据" ${currentSkill.category === '数据' ? 'selected' : ''}>数据</option>
                                <option value="语言" ${currentSkill.category === '语言' ? 'selected' : ''}>语言</option>
                                <option value="开发" ${currentSkill.category === '开发' ? 'selected' : ''}>开发</option>
                                <option value="其他" ${currentSkill.category === '其他' ? 'selected' : ''}>其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">版本</label>
                            <input type="text" class="form-input" id="skill-version" value="${currentSkill.version}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" class="form-input" id="skill-desc" value="${currentSkill.description}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select class="form-select" id="skill-status">
                            <option value="draft" ${currentSkill.status === 'draft' ? 'selected' : ''}>草稿</option>
                            <option value="active" ${currentSkill.status === 'active' ? 'selected' : ''}>已启用</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">🔄 工作流</div>
                    <div id="steps-container">
                        ${currentSkill.steps.map((step, i) => `
                            <div style="display: flex; gap: 8px; margin-bottom: 8px; align-items: center;">
                                <span style="width: 24px; height: 24px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;">${step.step}</span>
                                <input type="text" class="form-input" id="step-name-${i}" value="${step.name}" style="flex: 1;">
                                <input type="text" class="form-input" id="step-desc-${i}" value="${step.desc}" style="flex: 2;">
                                <button class="btn" onclick="removeStep(${i})" style="color: var(--danger);">×</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn" onclick="addStep()" style="margin-top: 8px;">
                        <span>＋</span> 添加步骤
                    </button>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">💻 执行代码</div>
                    <div class="code-editor">
                        <div class="code-editor-header">
                            <div class="code-dot code-dot-red"></div>
                            <div class="code-dot code-dot-yellow"></div>
                            <div class="code-dot code-dot-green"></div>
                            <span class="code-editor-title">skill-executor.py</span>
                        </div>
                        <div class="code-editor-body">
                            <textarea class="code-textarea" id="skill-code" style="min-height: 200px;">${currentSkill.code}</textarea>
                        </div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-primary" onclick="saveSkill()">
                        💾 保存技能
                    </button>
                    <button class="btn" onclick="testSkill()">
                        🧪 测试执行
                    </button>
                    <button class="btn" onclick="publishSkill()">
                        🚀 发布
                    </button>
                    <button class="btn" onclick="deleteSkill()" style="margin-left: auto; color: var(--danger);">
                        🗑️ 删除
                    </button>
                </div>
                
                <div class="test-section" style="margin-top: 20px;">
                    <div class="test-header">🧪 技能执行测试</div>
                    <div class="test-input-group">
                        <input type="text" class="test-input" id="test-input" value="test-data.csv" placeholder="输入测试参数...">
                        <button class="btn btn-primary" onclick="runSkillTest()">运行技能</button>
                    </div>
                    <div class="test-output" id="test-output">// 技能执行日志将显示在这里...</div>
                </div>
            `;
        }
        
        function addStep() {
            const container = document.getElementById('steps-container');
            const num = container.children.length + 1;
            const div = document.createElement('div');
            div.style.cssText = 'display: flex; gap: 8px; margin-bottom: 8px; align-items: center;';
            div.innerHTML = `
                <span style="width: 24px; height: 24px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;">${num}</span>
                <input type="text" class="form-input" id="step-name-${num-1}" value="新步骤" style="flex: 1;">
                <input type="text" class="form-input" id="step-desc-${num-1}" value="" style="flex: 2;">
                <button class="btn" onclick="removeStep(${num-1})" style="color: var(--danger);">×</button>
            `;
            container.appendChild(div);
        }
        
        function removeStep(index) {
            const container = document.getElementById('steps-container');
            if (container.children[index]) {
                container.children[index].remove();
            }
        }
        
        function showList() {
            document.getElementById('view-title').textContent = '技能管理';
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            currentSkill = null;
        }
        
        function createNew() {
            const newSkill = {
                id: Date.now().toString(),
                name: '新技能',
                icon: '⚡',
                description: '请描述这个技能的功能',
                category: '其他',
                version: '0.1.0',
                status: 'draft',
                steps: [{ step: 1, name: '步骤 1', desc: '请描述这个步骤' }],
                code: 'def execute(params):\n    result = process(params)\n    return result'
            };
            skills.unshift(newSkill);
            renderSkillsList(skills);
            renderSkillNav();
            showDetail(newSkill.id);
        }
        
        function generateWithAI() {
            const desc = prompt('请描述您需要的技能功能：');
            if (desc) {
                alert(`✨ AI 正在分析需求并生成技能...\n\n"${desc}"`);
                createNew();
            }
        }
        
        function saveSkill() {
            if (!currentSkill) return;
            
            currentSkill.name = document.getElementById('skill-name').value;
            currentSkill.icon = document.getElementById('skill-icon').value;
            currentSkill.category = document.getElementById('skill-category').value;
            currentSkill.version = document.getElementById('skill-version').value;
            currentSkill.description = document.getElementById('skill-desc').value;
            currentSkill.status = document.getElementById('skill-status').value;
            currentSkill.code = document.getElementById('skill-code').value;
            
            const steps = [];
            const container = document.getElementById('steps-container');
            container.querySelectorAll('div').forEach((div, i) => {
                const nameInput = div.querySelector(`#step-name-${i}`);
                const descInput = div.querySelector(`#step-desc-${i}`);
                if (nameInput && descInput) {
                    steps.push({ step: i + 1, name: nameInput.value, desc: descInput.value });
                }
            });
            currentSkill.steps = steps;
            
            renderSkillsList(skills);
            renderSkillNav();
            showDetail(currentSkill.id);
            alert('✅ 技能已保存！');
        }
        
        function testSkill() {
            runSkillTest();
        }
        
        function runSkillTest() {
            const output = document.getElementById('test-output');
            const input = document.getElementById('test-input').value;
            
            output.textContent = `▶ 开始执行: ${currentSkill.name}\n`;
            
            currentSkill.steps.forEach((step, i) => {
                setTimeout(() => {
                    output.textContent += `\nStep ${i + 1}/${currentSkill.steps.length}: ${step.name}... ✔️`;
                }, 300 * i);
            });
            
            setTimeout(() => {
                output.textContent += '\n\n✅ 技能执行完成！\n📦 输出结果: {"status": "success"}';
            }, 300 * currentSkill.steps.length + 200);
        }
        
        function publishSkill() {
            if (!currentSkill) return;
            currentSkill.status = 'active';
            saveSkill();
            alert('🚀 技能已发布！');
        }
        
        function deleteSkill() {
            if (!currentSkill) return;
            if (!confirm(`确定要删除 "${currentSkill.name}" 吗？`)) return;
            
            skills = skills.filter(s => s.id !== currentSkill.id);
            renderSkillsList(skills);
            renderSkillNav();
            showList();
        }
    </script>
</body>
</html>
