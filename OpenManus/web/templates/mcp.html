<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA-AI - MCP 管理</title>
    <link rel="stylesheet" href="/static/css/admin-unified.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">🔌</div>
                    <span class="sidebar-logo-text">DATA-AI</span>
                </div>
                <button class="back-btn" onclick="window.location.href='/'">
                    <span>←</span>
                    <span>返回主页</span>
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">管理中心</div>
                    <div class="nav-item" onclick="window.location.href='/agents'">
                        <span class="nav-item-icon">🤖</span>
                        <span class="nav-item-text">智能体</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/prompts'">
                        <span class="nav-item-icon">📝</span>
                        <span class="nav-item-text">提示词</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='/skills'">
                        <span class="nav-item-icon">⚡</span>
                        <span class="nav-item-text">技能</span>
                    </div>
                    <div class="nav-item active" onclick="showView('mcp')">
                        <span class="nav-item-icon">🔌</span>
                        <span class="nav-item-text">MCP</span>
                    </div>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">MCP 服务器</div>
                    <div id="mcp-nav-list"></div>
                </div>
            </div>
        </div>
        
        <div class="admin-main">
            <div class="admin-topbar">
                <div class="admin-topbar-left">
                    <h1 class="admin-title" id="view-title">MCP 管理</h1>
                </div>
                <div class="admin-topbar-right">
                    <button class="btn" onclick="discoverServers()">
                        <span>🔍</span> 发现服务器
                    </button>
                    <button class="btn btn-primary" onclick="createNew()">
                        <span>＋</span> 添加服务器
                    </button>
                </div>
            </div>
            
            <div class="admin-content" id="content-area">
                <div id="list-view">
                    <div class="list-header">
                        <div class="search-box">
                            <span>🔍</span>
                            <input type="text" placeholder="搜索服务器..." id="search-input" oninput="filterServers()">
                        </div>
                    </div>
                    <div class="list-grid" id="servers-grid"></div>
                </div>
                
                <div id="detail-view" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <script>
        let servers = [
            {
                id: '1',
                name: '文件系统',
                icon: '📁',
                description: '访问和操作本地文件系统',
                type: 'stdio',
                status: 'online',
                command: 'npx',
                args: ['-y', '@modelcontextprotocol/server-filesystem', '/workspace'],
                tools: ['read_file', 'write_file', 'list_directory', 'search_files']
            },
            {
                id: '2',
                name: 'GitHub',
                icon: '🐙',
                description: '与 GitHub 仓库和问题交互',
                type: 'stdio',
                status: 'online',
                command: 'npx',
                args: ['-y', '@modelcontextprotocol/server-github'],
                tools: ['list_repos', 'get_issues', 'create_issue', 'get_prs']
            },
            {
                id: '3',
                name: 'PostgreSQL',
                icon: '🐘',
                description: '连接和查询 PostgreSQL 数据库',
                type: 'stdio',
                status: 'offline',
                command: 'npx',
                args: ['-y', '@modelcontextprotocol/server-postgres'],
                tools: ['query', 'list_tables', 'get_schema']
            },
            {
                id: '4',
                name: 'SlideFlow',
                icon: '🔬',
                description: '病理学图像分析服务',
                type: 'stdio',
                status: 'connecting',
                command: 'python',
                args: ['-m', 'slideflow.mcp'],
                tools: ['analyze_slide', 'stain_normalization', 'generate_heatmap']
            }
        ];
        
        let currentServer = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            renderServersList(servers);
            renderServerNav();
        });
        
        function renderServersList(list) {
            const grid = document.getElementById('servers-grid');
            if (list.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">🔌</div>
                        <div class="empty-title">暂无 MCP 服务器</div>
                        <div class="empty-desc">点击"添加服务器"连接一个</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = list.map(s => `
                <div class="card" onclick="showDetail('${s.id}')">
                    <div class="card-icon">${s.icon}</div>
                    <div class="card-title">${s.name}</div>
                    <div class="card-desc">${s.description}</div>
                    <div class="card-tags">
                        <span class="tag">${s.type}</span>
                        <span class="tag">${s.tools.length} 工具</span>
                        <span class="tag ${s.status === 'online' ? 'tag-success' : ''}">
                            <span class="status-dot status-${s.status}"></span>
                            ${s.status === 'online' ? '在线' : s.status === 'offline' ? '离线' : '连接中'}
                        </span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderServerNav() {
            const nav = document.getElementById('mcp-nav-list');
            nav.innerHTML = servers.map(s => `
                <div class="nav-item" onclick="showDetail('${s.id}')" style="padding: 8px 16px; font-size: 13px;">
                    <span>${s.icon}</span>
                    <span>${s.name}</span>
                    <span class="status-dot status-${s.status}" style="margin-left: auto;"></span>
                </div>
            `).join('');
        }
        
        function filterServers() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = servers.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.description.toLowerCase().includes(query)
            );
            renderServersList(filtered);
        }
        
        function showDetail(id) {
            currentServer = servers.find(s => s.id === id);
            if (!currentServer) return;
            
            document.getElementById('view-title').textContent = currentServer.name;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            document.getElementById('detail-view').innerHTML = `
                <div class="detail-header">
                    <div class="detail-icon">${currentServer.icon}</div>
                    <div>
                        <div class="detail-title">${currentServer.name}</div>
                        <div class="detail-desc">
                            ${currentServer.description}
                            <span class="status-indicator" style="margin-left: 8px;">
                                <span class="status-dot status-${currentServer.status}"></span>
                                ${currentServer.status === 'online' ? '在线' : currentServer.status === 'offline' ? '离线' : '连接中'}
                            </span>
                        </div>
                    </div>
                    <button class="btn" onclick="showList()" style="margin-left: auto;">
                        ← 返回列表
                    </button>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">📋 基本信息</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">名称</label>
                            <input type="text" class="form-input" id="server-name" value="${currentServer.name}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">图标</label>
                            <input type="text" class="form-input" id="server-icon" value="${currentServer.icon}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" class="form-input" id="server-desc" value="${currentServer.description}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">类型</label>
                        <select class="form-select" id="server-type">
                            <option value="stdio" ${currentServer.type === 'stdio' ? 'selected' : ''}>STDIO</option>
                            <option value="sse" ${currentServer.type === 'sse' ? 'selected' : ''}>SSE</option>
                            <option value="websocket" ${currentServer.type === 'websocket' ? 'selected' : ''}>WebSocket</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">⚙️ 命令配置</div>
                    <div class="form-group">
                        <label class="form-label">命令</label>
                        <input type="text" class="form-input" id="server-command" value="${currentServer.command}" placeholder="e.g., npx">
                    </div>
                    <div class="form-group">
                        <label class="form-label">参数（每行一个）</label>
                        <textarea class="form-textarea" id="server-args" style="min-height: 80px;">${currentServer.args.join('\\n')}</textarea>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-section-title">🔧 可用工具（${currentServer.tools.length}个）</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${currentServer.tools.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                </div>
                
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-primary" onclick="saveServer()">
                        💾 保存配置
                    </button>
                    ${currentServer.status === 'online' ? 
                        `<button class="btn" onclick="stopServer()">⏹ 停止</button>` :
                        `<button class="btn" onclick="startServer()">▶ 启动</button>`
                    }
                    <button class="btn" onclick="testConnection()">
                        🔗 测试连接
                    </button>
                    <button class="btn" onclick="deleteServer()" style="margin-left: auto; color: var(--danger);">
                        🗑️ 删除
                    </button>
                </div>
                
                <div class="test-section" style="margin-top: 20px;">
                    <div class="test-header">🧪 工具调用测试</div>
                    <div class="form-group" style="margin-bottom: 12px;">
                        <label class="form-label">选择工具</label>
                        <select class="form-select" id="test-tool">
                            ${currentServer.tools.map(t => `<option value="${t}">${t}</option>`).join('')}
                        </select>
                    </div>
                    <div class="test-input-group">
                        <input type="text" class="test-input" id="test-params" value='{}' placeholder="参数 (JSON)">
                        <button class="btn btn-primary" onclick="runToolTest()">调用工具</button>
                    </div>
                    <div class="test-output" id="test-output">// 工具调用结果将显示在这里...</div>
                </div>
            `;
        }
        
        function showList() {
            document.getElementById('view-title').textContent = 'MCP 管理';
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            currentServer = null;
        }
        
        function createNew() {
            const newServer = {
                id: Date.now().toString(),
                name: '新 MCP 服务器',
                icon: '🔌',
                description: '请描述这个服务器的功能',
                type: 'stdio',
                status: 'offline',
                command: '',
                args: [],
                tools: []
            };
            servers.unshift(newServer);
            renderServersList(servers);
            renderServerNav();
            showDetail(newServer.id);
        }
        
        function saveServer() {
            if (!currentServer) return;
            
            currentServer.name = document.getElementById('server-name').value;
            currentServer.icon = document.getElementById('server-icon').value;
            currentServer.description = document.getElementById('server-desc').value;
            currentServer.type = document.getElementById('server-type').value;
            currentServer.command = document.getElementById('server-command').value;
            currentServer.args = document.getElementById('server-args').value.split('\\n').filter(a => a.trim());
            
            renderServersList(servers);
            renderServerNav();
            showDetail(currentServer.id);
            alert('✅ 服务器配置已保存！');
        }
        
        function startServer() {
            if (!currentServer) return;
            
            currentServer.status = 'connecting';
            renderServersList(servers);
            renderServerNav();
            showDetail(currentServer.id);
            
            setTimeout(() => {
                currentServer.status = 'online';
                renderServersList(servers);
                renderServerNav();
                showDetail(currentServer.id);
                alert('✅ MCP 服务器已启动！');
            }, 1500);
        }
        
        function stopServer() {
            if (!currentServer) return;
            currentServer.status = 'offline';
            renderServersList(servers);
            renderServerNav();
            showDetail(currentServer.id);
            alert('⏹ MCP 服务器已停止');
        }
        
        function testConnection() {
            if (!currentServer) return;
            
            const output = document.getElementById('test-output');
            output.textContent = `// 测试连接到 ${currentServer.name}...\n// 发送初始化请求...`;
            
            setTimeout(() => {
                output.textContent += `\n// ✔️ 连接成功！\n// 发现 ${currentServer.tools.length} 个工具`;
            }, 1000);
        }
        
        function runToolTest() {
            const tool = document.getElementById('test-tool').value;
            const params = document.getElementById('test-params').value;
            const output = document.getElementById('test-output');
            
            output.textContent = `// 调用工具: ${tool}\n// 参数: ${params}\n// 执行中...`;
            
            setTimeout(() => {
                output.textContent += `\n\n✅ 调用成功！\n\n结果:\n{ "status": "ok", "data": "..." }`;
            }, 800);
        }
        
        function deleteServer() {
            if (!currentServer) return;
            if (!confirm(`确定要删除 "${currentServer.name}" 吗？`)) return;
            
            servers = servers.filter(s => s.id !== currentServer.id);
            renderServersList(servers);
            renderServerNav();
            showList();
        }
        
        function discoverServers() {
            alert('🔍 正在扫描本地 MCP 服务器...');
            setTimeout(() => {
                alert('✅ 发现 0 个新服务器');
            }, 1000);
        }
    </script>
</body>
</html>
