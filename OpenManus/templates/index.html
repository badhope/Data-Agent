<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataAgent - 智能数据助手</title>
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/modern.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            height: 100vh; 
            overflow: hidden; 
        }
        #root { display: flex; height: 100%; }

        /* Sidebar */
        .sidebar { 
            width: 280px; 
            background: var(--bg-secondary); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            transition: all 0.3s ease;
            position: relative;
        }
        .sidebar.closed { width: 0; overflow: hidden; }
        
        .sidebar-header { 
            padding: 20px; 
            border-bottom: 1px solid var(--border); 
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
        }
        
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon { 
            width: 44px; 
            height: 44px; 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: transform 0.3s ease;
        }
        .logo:hover .logo-icon { transform: scale(1.05); }
        .logo-text { font-size: 19px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; padding: 8px 12px; letter-spacing: 0.5px; }
        
        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            color: var(--text-secondary); 
            border: none; 
            background: none; 
            width: 100%; 
            text-align: left; 
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--primary);
            transition: height 0.2s ease;
        }
        .nav-item:hover { 
            background: var(--bg-tertiary); 
            color: var(--text-primary);
        }
        .nav-item:hover::before { height: 60%; }
        .nav-item.active { 
            background: rgba(59, 130, 246, 0.15); 
            color: var(--primary);
        }
        .nav-item.active::before { height: 60%; }
        
        .nav-icon { font-size: 17px; }
        .nav-text { font-size: 14px; font-weight: 500; }

        .sidebar-footer { 
            padding: 16px; 
            border-top: 1px solid var(--border);
            background: linear-gradient(0deg, rgba(59, 130, 246, 0.05) 0%, transparent 100%);
        }
        
        .ws-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; }
        .status-dot.connected { 
            background: #10b981; 
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            animation: pulse 2s ease-in-out infinite; 
        }
        .status-dot.disconnected { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }

        @keyframes pulse { 
            0%, 100% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.6; transform: scale(1.1); } 
        }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { 
            height: 64px; 
            background: var(--bg-secondary); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            gap: 12px;
            position: relative;
            z-index: 10;
        }
        
        .header-menu-btn { 
            width: 36px; 
            height: 36px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 10px; 
            background: var(--bg-tertiary); 
            font-size: 18px; 
            cursor: pointer; 
            border: none; 
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        .header-menu-btn:hover { background: var(--bg-hover); transform: scale(1.02); }
        
        .header-title { flex: 1; }
        .header-title h1 { font-size: 16px; font-weight: 600; }
        .header-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        
        .header-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
        .header-actions { display: flex; gap: 8px; }
        
        .action-btn { 
            padding: 9px 16px; 
            background: var(--bg-tertiary); 
            border-radius: 10px; 
            font-size: 13px; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            cursor: pointer; 
            border: none; 
            color: var(--text-primary); 
            transition: all 0.2s ease;
        }
        .action-btn:hover { 
            background: var(--bg-hover); 
            transform: translateY(-1px);
        }
        .action-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }
        .action-btn.primary:hover {
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        /* Chat Area */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-primary); }
        .chat-container { max-width: 900px; margin: 0 auto; }
        
        .message { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 20px;
            animation: slide-in-right 0.3s ease-out;
        }
        .message.assistant { flex-direction: row-reverse; }
        
        .avatar { 
            width: 40px; 
            height: 40px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px;
            flex-shrink: 0;
        }
        .avatar.user { background: linear-gradient(135deg, #667eea, #764ba2); }
        .avatar.assistant { background: linear-gradient(135deg, var(--primary), var(--accent)); }
        
        .message-content { 
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
        }
        .message.user .message-content { 
            background: var(--bg-tertiary); 
            border-radius: 16px 16px 4px 16px;
        }
        .message.assistant .message-content { 
            background: var(--bg-secondary); 
            border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
        }
        
        .message-text { font-size: 15px; color: var(--text-primary); }
        .message-time { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
        
        /* Thinking Container */
        #thinking-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            animation: fade-in 0.3s ease-out;
        }
        
        .thinking-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, transparent 100%);
            border-radius: 12px;
            padding: 16px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease-out;
        }
        .thinking-card.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .thinking-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .thinking-icon { font-size: 20px; }
        .thinking-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        
        .thinking-content {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }
        
        .thinking-progress {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .thinking-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease-out;
        }
        
        .thinking-progress-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
            margin-bottom: 12px;
        }
        
        .thinking-status {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        
        .thinking-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: thinking-pulse 1.4s ease-in-out infinite;
        }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes thinking-pulse {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input Area */
        .input-area { 
            padding: 16px 20px; 
            background: var(--bg-secondary); 
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .input-container { 
            max-width: 900px; 
            margin: 0 auto; 
            display: flex; 
            align-items: flex-end; 
            gap: 10px;
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        
        #user-input {
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            min-height: 48px;
            max-height: 200px;
            overflow-y: auto;
            transition: all 0.2s ease;
        }
        #user-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        #user-input::placeholder { color: var(--text-muted); }
        
        .input-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .input-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: var(--bg-tertiary);
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            font-size: 18px;
        }
        .input-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            transform: scale(1.05);
        }
        .input-btn.send {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }
        .input-btn.send:hover {
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transform: scale(1.05);
        }
        .input-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Voice Input */
        .voice-recording {
            animation: pulse 1.5s ease-in-out infinite;
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
        }
        
        /* Welcome Page */
        .welcome-page { flex: 1; display: flex; align-items: center; justify-content: center; }
        .welcome-center { text-align: center; max-width: 600px; animation: fade-in 0.5s ease-out; }
        
        .welcome-logo { 
            width: 100px; 
            height: 100px; 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 44px; 
            font-weight: bold; 
            margin: 0 auto 32px;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
            transition: transform 0.3s ease;
        }
        .welcome-center:hover .welcome-logo { transform: scale(1.05); }
        
        .welcome-title { 
            font-size: 32px; 
            font-weight: 700; 
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .welcome-subtitle { 
            color: var(--text-muted); 
            font-size: 16px; 
            margin-bottom: 40px; 
            line-height: 1.6;
        }
        
        .suggestion-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
        }
        
        .suggestion-card {
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }
        .suggestion-card:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.15);
        }
        
        .suggestion-icon { font-size: 20px; margin-bottom: 12px; }
        .suggestion-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .suggestion-desc { font-size: 12px; color: var(--text-muted); }

        /* Tooltip */
        .tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .tooltip.show { opacity: 1; visibility: visible; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; z-index: 100; }
            .sidebar.closed { transform: translateX(-100%); width: 280px; }
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 99;
                display: none;
            }
            .sidebar-overlay.show { display: block; }
            
            .message-content { max-width: 85%; }
            .suggestion-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo" onclick="location.href='/'">
                    <div class="logo-icon">DA</div>
                    <span class="logo-text">DataAgent</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">核心功能</div>
                    <button class="nav-item active" id="nav-chat">
                        <span class="nav-icon">💬</span>
                        <span class="nav-text">对话</span>
                    </button>
                    <button class="nav-item" id="nav-knowledge">
                        <span class="nav-icon">📚</span>
                        <span class="nav-text">知识库</span>
                    </button>
                    <button class="nav-item" id="nav-skills">
                        <span class="nav-icon">⚡</span>
                        <span class="nav-text">技能管理</span>
                    </button>
                    <button class="nav-item" id="nav-prompts">
                        <span class="nav-icon">📝</span>
                        <span class="nav-text">提示词管理</span>
                    </button>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">连接</div>
                    <button class="nav-item" id="nav-mcp">
                        <span class="nav-icon">🔌</span>
                        <span class="nav-text">MCP管理</span>
                    </button>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">设置</div>
                    <button class="nav-item" id="nav-settings">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">设置</span>
                    </button>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="ws-status">
                    <span class="status-dot" id="ws-status"></span>
                    <span id="ws-text">连接中...</span>
                </div>
            </div>
        </aside>
        
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <button class="header-menu-btn" id="sidebar-toggle">☰</button>
                <div class="header-title">
                    <h1>智能助手</h1>
                    <div class="header-subtitle">基于AI的智能数据助手</div>
                </div>
                <div class="header-status">
                    <span class="status-dot connected"></span>
                    <span>在线</span>
                </div>
                <div class="header-actions">
                    <button class="action-btn" id="clear-chat">🗑️ 清空</button>
                    <button class="action-btn primary" id="new-chat">+ 新对话</button>
                </div>
            </header>
            
            <!-- Welcome Page -->
            <div class="welcome-page" id="welcome-page">
                <div class="welcome-center">
                    <div class="welcome-logo">DA</div>
                    <h1 class="welcome-title">DataAgent</h1>
                    <p class="welcome-subtitle">智能数据助手，助力您的工作与学习。支持文档处理、智能问答、多语言翻译等功能。</p>
                    <div class="suggestion-grid">
                        <div class="suggestion-card" onclick="sendMessage('帮我生成一份会议纪要')">
                            <div class="suggestion-icon">📋</div>
                            <div class="suggestion-title">会议纪要</div>
                            <div class="suggestion-desc">根据会议记录生成结构化纪要</div>
                        </div>
                        <div class="suggestion-card" onclick="sendMessage('总结一下这篇文章的要点')">
                            <div class="suggestion-icon">📝</div>
                            <div class="suggestion-title">文献摘要</div>
                            <div class="suggestion-desc">提取文章核心内容</div>
                        </div>
                        <div class="suggestion-card" onclick="sendMessage('把这段话翻译成英文')">
                            <div class="suggestion-icon">🌐</div>
                            <div class="suggestion-title">多语言翻译</div>
                            <div class="suggestion-desc">支持多种语言互译</div>
                        </div>
                        <div class="suggestion-card" onclick="sendMessage('帮我生成一份商业PPT')">
                            <div class="suggestion-icon">📊</div>
                            <div class="suggestion-title">PPT生成</div>
                            <div class="suggestion-desc">快速创建演示文稿</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Chat Area -->
            <div class="chat-area" id="chat-area" style="display: none;">
                <div class="chat-container" id="chat-container">
                    <!-- Messages will be added here -->
                </div>
                
                <!-- Thinking Container -->
                <div id="thinking-container" class="hidden" style="display: none;">
                    <div class="thinking-card">
                        <div class="thinking-header">
                            <span class="thinking-icon">🔄</span>
                            <span class="thinking-title">处理中...</span>
                        </div>
                        <div class="thinking-content">正在分析您的请求...</div>
                        <div class="thinking-progress">
                            <div class="thinking-progress-fill"></div>
                        </div>
                        <div class="thinking-progress-text">0%</div>
                        <div class="thinking-status">
                            <span class="thinking-dot"></span>
                            <span class="thinking-dot"></span>
                            <span class="thinking-dot"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea 
                            id="user-input" 
                            placeholder="输入您的消息..." 
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                        ></textarea>
                    </div>
                    <div class="input-actions">
                        <button class="input-btn" id="voice-btn" title="语音输入">🎤</button>
                        <button class="input-btn" id="upload-btn" title="上传文件">📁</button>
                        <button class="input-btn send" id="send-btn" title="发送">➤</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/voice_input.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
