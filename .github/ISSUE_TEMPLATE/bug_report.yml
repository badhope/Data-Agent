name: Bug Report
description: Report a bug to help us improve
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        感谢您花时间填写这个Bug报告！
  
  - type: textarea
    id: description
    attributes:
      label: Description / 描述
      description: A clear description of the bug / 清晰描述这个Bug
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: How can we reproduce the behavior? / 如何复现这个问题？
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 预期行为
      description: What did you expect to happen? / 您期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际行为
      description: What actually happened? / 实际发生了什么？
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: What version of the package are you using? / 您使用的是什么版本？
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment / 环境
      description: |
        - Node.js version:
        - OS:
        - Provider (OpenAI/Ollama/etc):
      value: |
        - Node.js:
        - OS:
        - Provider:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      description: Please copy and paste any relevant log output / 请复制粘贴相关日志输出
      render: shell
